<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub | Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- tailwindcss cdn + daisyui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="bg-[#f8fafc]">
    <!-- header -->
    <header class="bg-white max-w-[1600px] mx-auto px-20 py-4 flex flex-col lg:flex-row justify-center lg:justify-between gap-4 items-center">
        <div id="left-div" class="flex items-center gap-1">
            <img src="assets/github-logo.png" alt="GitHub logo" class="w-9">
            <h2 class="font-semibold text-xl">GitHub Issues Tracker</h2>
        </div>
        <div id="right-div" class="flex gap-4">
            <label class="input input-bordered flex items-center gap-2 rounded-md">
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                <input id="input-search" type="text" class="grow" placeholder="Press Enter to search issues..." />
            </label>
            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
    </header>
    <section id="btn-container" class="bg-white rounded-md shadow-md max-w-[1110px] mx-auto mt-3 lg:mt-[60px] p-6 flex gap-2 justify-center lg:justify-start">
        <button onclick="loadAll(); toggleButtons('all-btn')" id="all-btn"
            class="btn btn-primary w-[120px] ">All</button>
        <button onclick="toggleButtons('open-btn')" id="open-btn" class="btn btn-outline w-[120px]">Open</button>
        <button onclick="toggleButtons('closed-btn')" id="closed-btn" class="btn btn-outline w-[120px]">closed</button>
    </section>

    <!-- info section -->
    <section id="tracker-container"
        class="bg-white rounded-md shadow-md max-w-[1110px]  mx-auto mt-4 p-6 flex justify-between">
        <div class="flex items-center gap-2">
            <img src="assets/Aperture.png" alt="Aperture.png">
            <div class="">
                <p class="font-semibold text-[20px]"><span id="count">0</span> Issues</p>
                <p class="text-gray-500">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4">
            <div class="flex items-center gap-1">
                <div class="bg-[#00a96e] w-3 h-3 rounded-full"></div>
                <p>Open</p>
            </div>
            <div class="flex items-center gap-1">
                <div class="bg-[#A855F7] w-3 h-3 rounded-full"></div>
                <p>Closed</p>
            </div>

        </div>
    </section>

    <!-- spinner -->
    <section id="spinner"
        class="max-w-[1110px] mx-auto bg-white mt-6 rounded-md shadow-md flex justify-center py-48 hidden">
        <span class="loading loading-spinner text-primary"></span>
    </section>

    <!-- cards holder -->
    <section id="issue-card-container"
        class="bg-[#fbfbfb] rounded-md shadow-md max-w-[1110px]  mx-auto mt-[60px] p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

    </section>

    <!-- modal -->
    <!-- Open the modal using ID.showModal() method -->
    <dialog id="details_modal" class="modal">
        <div class="modal-box">
            <div id="details-container">
                
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>
    <script src="scripts/main.js"></script>
</body>

</html>
